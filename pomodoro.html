<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pomodoro.css">
</head>
<body>
  <div id="pomodoro-shell">
    <!-- Draggable title region -->
    <header id="pomo-header">
      <span id="pomo-title">🍅 Pomodoro</span>
      <div id="pomo-header-btns">
        <button id="pomo-settings-toggle" aria-label="Settings" title="Settings">⚙</button>
        <button id="pomo-close" aria-label="Close timer">✕</button>
      </div>
    </header>

    <!-- ═══ Timer View ═══ -->
    <div id="timer-view">
      <!-- Phase indicator -->
      <div id="phase-indicator">
        <span id="phase-label">Ready</span>
        <div id="phase-dots"></div>
      </div>

      <!-- Timer ring -->
      <div id="timer-container">
        <svg id="timer-ring" viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="70" />
          <circle id="ring-progress" class="ring-fg" cx="80" cy="80" r="70" />
        </svg>
        <div id="timer-display">
          <span id="timer-minutes">25</span>
          <span id="timer-sep">:</span>
          <span id="timer-seconds">00</span>
        </div>
      </div>

      <!-- Controls -->
      <div id="controls">
        <button id="btn-start" class="ctrl-btn primary">Start</button>
        <button id="btn-pause" class="ctrl-btn" style="display:none;">Pause</button>
        <button id="btn-reset" class="ctrl-btn secondary">Reset</button>
      </div>

      <!-- Session counter -->
      <div id="session-counter">
        <span id="session-count">0</span> sessions completed
      </div>
    </div>

    <!-- ═══ Settings View ═══ -->
    <div id="settings-view" class="hidden">
      <div class="settings-group">
        <label class="settings-label">Focus Duration</label>
        <div class="settings-row">
          <input type="range" id="set-work" min="1" max="90" value="25" class="settings-slider">
          <span id="set-work-val" class="settings-val">25 min</span>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Short Break</label>
        <div class="settings-row">
          <input type="range" id="set-short-break" min="1" max="30" value="5" class="settings-slider">
          <span id="set-short-break-val" class="settings-val">5 min</span>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Long Break</label>
        <div class="settings-row">
          <input type="range" id="set-long-break" min="5" max="60" value="15" class="settings-slider">
          <span id="set-long-break-val" class="settings-val">15 min</span>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Sessions before Long Break</label>
        <div class="settings-row">
          <input type="range" id="set-cycles" min="1" max="10" value="4" class="settings-slider">
          <span id="set-cycles-val" class="settings-val">4</span>
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">
          <input type="checkbox" id="set-auto-break" checked>
          Auto-start breaks
        </label>
      </div>

      <div class="settings-group">
        <label class="settings-label">
          <input type="checkbox" id="set-auto-work" checked>
          Auto-start focus after break
        </label>
      </div>

      <div id="settings-actions">
        <button id="btn-save-settings" class="ctrl-btn primary">Save</button>
        <button id="btn-cancel-settings" class="ctrl-btn secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="pomodoro.js"></script>
</body>
</html>
