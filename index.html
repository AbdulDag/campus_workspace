<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Campus Workspace — Secure browser for University of Guelph students">
  <title>Campus Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Custom Title Bar ──────────────────────────────────── -->
  <header id="title-bar">
    <div id="title-bar-drag">
      <svg id="app-logo" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect width="20" height="20" rx="4" fill="#ff7632"/>
        <path d="M6 14V6h3.5c1.1 0 2 .4 2.6 1 .5.5.9 1.3.9 2.2 0 .9-.3 1.6-.9 2.2-.6.5-1.5.8-2.6.8H8.2V14H6zm2.2-3.6h1.2c.5 0 .9-.1 1.2-.4.3-.3.4-.6.4-1s-.1-.8-.4-1c-.3-.3-.7-.4-1.2-.4H8.2v2.8z" fill="#191b1f"/>
      </svg>
      <span id="title-text">Campus Workspace</span>
    </div>

    <!-- ── Dynamic Tab Strip ─────────────────────────────── -->
    <div id="tab-strip">
      <!-- Tabs are dynamically injected here by renderer.js -->
    </div>
    <button id="btn-new-tab" class="chrome-btn" aria-label="New Tab" title="New Tab">
      <svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <div id="title-bar-controls">
      <button id="btn-minimize" class="title-btn" aria-label="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-maximize" class="title-btn" aria-label="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button id="btn-close" class="title-btn title-btn-close" aria-label="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Navigation / Address Bar ──────────────────────────── -->
  <nav id="nav-bar">
    <div id="nav-controls">
      <button id="btn-back" class="nav-btn" aria-label="Back" title="Back">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" aria-label="Forward" title="Forward">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" aria-label="Reload" title="Reload">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M13.5 8A5.5 5.5 0 112.5 8a5.5 5.5 0 0111 0z" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M13.5 3v5h-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
    </div>

    <div id="address-bar-wrapper">
      <div id="address-bar-secure-icon" title="Secure connection">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <rect x="2.5" y="5.5" width="7" height="5" rx="1" stroke="#4caf50" stroke-width="1"/>
          <path d="M4 5.5V4a2 2 0 014 0v1.5" stroke="#4caf50" stroke-width="1"/>
        </svg>
      </div>
      <input
        type="text"
        id="address-bar"
        placeholder="Search or enter URL…"
        spellcheck="false"
        autocomplete="off"
      />
      <div id="address-suggestions" class="hidden"></div>
    </div>

    <div id="nav-actions">
      <button id="btn-pomodoro" class="nav-action-btn" aria-label="Toggle Pomodoro Timer" title="Pomodoro Timer">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="10" r="7" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 6v4.5l3 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 2h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="heartbeat-indicator" title="Heartbeat status — courselink.uoguelph.ca">
        <span id="heartbeat-dot"></span>
        <span id="heartbeat-label">Idle</span>
      </div>
    </div>
  </nav>

  <!-- ── BrowserView renders below this point (managed by main.js) ── -->
  <!-- The BrowserView is positioned absolutely by main.js at y=CHROME_HEIGHT -->

  <!-- ── Status Bar ────────────────────────────────────────── -->
  <footer id="status-bar">
    <span id="status-session">Session: <span id="session-age">—</span></span>
    <span id="status-url" title="Current page URL"></span>
    <span id="status-secure">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <rect x="2.5" y="5.5" width="7" height="5" rx="1" stroke="#4caf50" stroke-width="1"/>
        <path d="M4 5.5V4a2 2 0 014 0v1.5" stroke="#4caf50" stroke-width="1"/>
      </svg>
      Secure · Zero-Knowledge
    </span>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
